name: smart_umrah_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.8
  lottie: ^3.3.1
  percent_indicator: ^4.2.5
  dropdown_search: ^6.0.2

  # Firebase Services
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.1
  firebase_storage: ^13.0.1

  # Maps & Location (Versions synced)
  flutter_map: ^6.1.0         # OpenStreetMap support
  latlong2: ^0.9.1            # Coordinates handling
  google_maps_flutter: ^2.13.1 # Google Maps support
  geocoding: ^3.0.0           # Address to Lat/Lng
  geolocator: ^11.0.0         # Location permission and GPS

  # Storage & State Management
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.10.1   # External image storage
  get: ^4.7.2                 # State management

  # Media & Formatting
  image_picker: ^1.2.0
  intl: ^0.20.2               # Date formatting
  youtube_player_flutter: ^9.1.2
  http: ^1.6.0
  just_audio: ^0.9.40         # Better web audio support
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/umrah_app_logo.png"

flutter:
  uses-material-design: true

  assets: 
    - assets/umrah_app_logo.png
    - assets/emailverify.json
    - assets/loadinginfinity.json
    - assets/en.json
    - assets/ur.json
    - assets/Thawaaf.json
    - assets/dua_niyyah.mp3
    - assets/dua_talbiyah.mp3
    - assets/dua_entering_masjid.mp3
    - assets/dua_seeing_kaaba.mp3
    - assets/dua_black_stone.mp3
    - assets/dua_between_rukn_yamani_hajr_aswad.mp3
    - assets/dua_multazam.mp3
    - assets/dua_maqam_ibrahim.mp3
    - assets/dua_drinking_zamzam.mp3
    - assets/dua_safa.mp3
    - assets/dua_during_sai.mp3
    - assets/dua_after_umrah.mp3

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

